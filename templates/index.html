<html>
<head>
<title>Sensors</title>
</head>
<body>
<h1>The following sensors can be viewed</h1>

{{ range .Sensors }}

  <a href="/static/sensor.html?name={{.}}&days=7">[7 days]</a>
</li>
{{ end }}
</ul>
</body>
</html>
